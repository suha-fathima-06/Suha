<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.login-container{
  background:#1e293b;
  padding:40px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

.login-container img{
  width:100px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  background:#4facfe;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#3b82f6;
}
</style>
</head>

<body>

<div class="login-container">

<img src="logo1.png">

<h2>Login</h2>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Login</button>

<p>Don't have an account? Register</p>

</div>

</body>
</html>
